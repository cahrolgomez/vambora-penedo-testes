<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="css/mapa.css">
</head>
<body>
    <main>
        <div id="map"></div>
        <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

        <h1>Rota - Linhas</h1>
        <ul>
            <li id="btnLinha1"><img src="img/img-bus/Linha 1.png" alt="Linha 1">Linha 1</li>
            <li id="btnLinha2"><img src="img/img-bus/Linha 2.png" alt="Linha 2">Linha 2</li>
            <li id="btnLinha3"><img src="img/img-bus/Linha 3.png" alt="Linha 3">Linha 3</li>
            <li id="btnCircular"><img src="img/img-bus/Circular.png" alt="Circular">Circular</li>
            <li id="btnSesi"><img src="img/img-bus/sesi.png" alt="Sesi">Sesi</li>
        </ul>
        <h2>Informações</h2>
        <div class="infor-container">

            <div class="l1-block">
                <div class="l-start">
                    <h3>Linha 1 - Início</h3>
                    <p>Cerquinha</p>
                </div>

                <div class="l-end">
                    <h3>Linha 1 - Fim</h3>
                    <p>Centro</p>
                </div>
            </div>
            
            <div class="l2-block">
                <div class="l-start">
                    <h3>Linha 2 - Início</h3>
                    <p>-----</p>
                </div>

                <div class="l-end">
                    <h3>Linha 2 - Fim</h3>
                    <p>-----</p>
                </div>
            </div>
            
            <div class="l3-block">
                <div class="l-start">
                    <h3>Linha 3 - Início</h3>
                    <p>-----</p>
                </div>

                <div class="l-end">
                    <h3>Linha 3 - Fim</h3>
                    <p>-----</p>
                </div>
            </div>
            
            <div class="circular-block">
                <div class="l-start">
                    <h3>Circular - Início</h3>
                    <p>-----</p>
                </div>

                <div class="l-end">
                    <h3>Circular - Fim</h3>
                    <p>-----</p>
                </div>

            </div>

        </div>

        <nav>
            <a href="perfil.html"><img src="img/icone-perfil.png" alt=""></a>
            <a href="carteira.html"><img src="img/icone-carteira.png" alt="Carteira"></a>
            <a class="mapa" href="mapa.html"><img src="img/icone-mapa.png" alt="Mapa">Mapa</a>
        </nav>
    </main>
    <script src="mapa.js"></script>
</body>
</html>
